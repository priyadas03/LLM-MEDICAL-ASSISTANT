name: CI
on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Ingest RAG sources
        run: npm run -w @apps/api ingest
      - name: Typecheck
        run: npm run typecheck
      - name: Run eval harness (Vitest)
        run: npm run -w @apps/api test

